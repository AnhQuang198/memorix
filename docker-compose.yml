services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: memorix
      POSTGRES_USER: memorix
      POSTGRES_PASSWORD: memorix
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memorix"]
      interval: 5s
      retries: 5
  redis:
    image: redis:8
    ports: ["6379:6379"]
  api:
    build: .
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://memorix:memorix@postgres:5432/memorix?sslmode=disable
      REDIS_URL: redis://redis:6379
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
  worker:
    build: .
    entrypoint: ["/worker"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://memorix:memorix@postgres:5432/memorix?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
