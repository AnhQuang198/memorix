version: "2"
sql:
  - engine: postgresql
    schema: migrations
    queries: db/queries/identity
    gen:
      go:
        package: gen
        out: internal/identity/repo/gen
        sql_package: pgx/v5
  - engine: postgresql
    schema: migrations
    queries: db/queries/progress
    gen:
      go:
        package: gen
        out: internal/progress/repo/gen
        sql_package: pgx/v5
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
# Thêm block tương tự cho vocabulary/scheduling/review khi story cần query.
